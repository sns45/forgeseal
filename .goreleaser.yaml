version: 2

builds:
  - id: forgeseal
    main: ./cmd/forgeseal
    binary: forgeseal
    ldflags:
      - -s -w
      - -X github.com/sn45/forgeseal/internal/cli.version={{.Version}}
      - -X github.com/sn45/forgeseal/internal/cli.commit={{.Commit}}
      - -X github.com/sn45/forgeseal/internal/cli.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

brews:
  - name: forgeseal
    repository:
      owner: sns45
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/sns45/forgeseal"
    description: "Supply chain security for JavaScript and TypeScript projects"
    license: "Apache-2.0"
    install: |
      bin.install "forgeseal"
    test: |
      system bin/"forgeseal", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
